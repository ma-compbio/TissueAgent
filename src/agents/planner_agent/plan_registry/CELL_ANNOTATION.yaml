template_id: CELL_ANNOTATION
task: Annotating cells in a spatial transcriptomics dataset
version: "1.0"
last_updated: 2025-11-11
tags: [spatial, cell type annotation, inference]

inputs:
  - spatial AnnData(.h5ad)
  - reference AnnData(.h5ad) to do cell type transfer

outputs:
  - updated spatial AnnData(.h5ad) object with cell type columns in .obs
  - .png of umap features of spatial AnnData(.h5ad) labeled by inferred cell types

# one-line sketch for the planner's lookup
step_sketch: >
  find reference dataset → use harmony transfer to infer cell types in spatial dataset → run umap on spatial dataset → create plot of umap features labeled by inferred cell type
# eval: ["file_exists(spatial_scatterplot.png)", "n_points>0", "n_nan==0", "aspect≈1"]

